	<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Insurance Registration Form</title>
</head>
<body>

    <h2>Car Insurance Registration Form</h2>

    <form method="post">

        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Name" required>
        <br><br>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email" required>
        <br><br>

        <label>Gender</label><br>

        <input type="radio" id="male" name="gender" value="Male" required>
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="Female" required>
        <label for="female">Female</label>
        <br><br>

        <label for="cars">Car Brands</label>
        <select id="cars">
            <option value="">Select Car Brand</option>
            <option value="BMW">BMW</option>
            <option value="Audi">Audi</option>
            <option value="Mercedez">Mercedez</option>
        </select>
        <br><br>

        <label for="carage">Car Age</label>
        <input type="number" id="carage" required>
        <br><br>

        <label for="dop">Date of Purchase</label>
        <input type="date" id="dop" required>
        <br><br>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password" required>
        <br><br>

        <button type="submit">Submit</button>

    </form>

</body>
